<section class="q-n-a">
  <div #projectsSection class="q-n-a__left-part">
    <div class="q-n-a__text-wrapper">
      <div class="q-n-a__title">
        <span class="title-animation-1">Check </span>
        <span class="title-animation-2">Out </span>
        <span class="q-n-a__title-special title-animation-3">My Projects </span>
      </div>
    </div>
  </div>

  <div class="q-n-a__right-part cards-animation">
    @for (project of projects; track $index; let i = $index) {
    <app-project-showcase [project]="project"></app-project-showcase>
    }
  </div>
</section>
